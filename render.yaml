services:
  - type: web
    name: quantumshieldai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.app.main
    plan: free
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
